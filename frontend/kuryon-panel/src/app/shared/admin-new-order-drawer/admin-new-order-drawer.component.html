@if (visible) {
  <div class="drawer-overlay" (click)="close()" role="presentation"></div>

  <aside class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="new-order-drawer-title">
    <div class="drawer-header">
      <div>
        <span class="drawer-badge">Yeni sipariş</span>
        <h2 id="new-order-drawer-title">Sipariş oluştur</h2>
        <p>Sipariş havuza eklenir; atanmamış bekleyen olarak görünür.</p>
      </div>
      <button type="button" class="drawer-close" (click)="close()" aria-label="Kapat">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <form class="drawer-form" (ngSubmit)="submit()">
      <label class="drawer-field">
        <span>Restoran / firma</span>
        <input
          type="text"
          [(ngModel)]="form.company"
          name="company"
          required
          autocomplete="organization"
          [class.input-invalid]="!!fieldErrors.company"
        />
        <small class="field-error" *ngIf="fieldErrors.company">{{ fieldErrors.company }}</small>
      </label>

      <label class="drawer-field">
        <span>Müşteri adı</span>
        <input
          type="text"
          [(ngModel)]="form.customer"
          name="customer"
          required
          autocomplete="name"
          [class.input-invalid]="!!fieldErrors.customer"
        />
        <small class="field-error" *ngIf="fieldErrors.customer">{{ fieldErrors.customer }}</small>
      </label>

      <label class="drawer-field">
        <span>Müşteri telefonu</span>
        <input
          type="tel"
          [(ngModel)]="form.customerPhone"
          name="customerPhone"
          inputmode="tel"
          placeholder="Örn. 0555 123 45 67"
          autocomplete="tel"
          [class.input-invalid]="!!fieldErrors.customerPhone"
        />
        <small class="field-error" *ngIf="fieldErrors.customerPhone">{{ fieldErrors.customerPhone }}</small>
      </label>

      <label class="drawer-field">
        <span>Restoran telefonu @if (settings.operations.restaurantPhoneRequired) { <strong>(zorunlu)</strong> }</span>
        <input
          type="tel"
          [(ngModel)]="form.restaurantPhone"
          name="restaurantPhone"
          inputmode="tel"
          placeholder="Örn. 0352 123 45 67"
          autocomplete="tel"
          [class.input-invalid]="!!fieldErrors.restaurantPhone"
        />
        <small class="field-error" *ngIf="fieldErrors.restaurantPhone">{{ fieldErrors.restaurantPhone }}</small>
      </label>

      <label class="drawer-field">
        <span>Adres</span>
        <textarea
          [(ngModel)]="form.address"
          name="address"
          rows="3"
          required
          autocomplete="street-address"
          [class.input-invalid]="!!fieldErrors.address"
        ></textarea>
        <small class="field-error" *ngIf="fieldErrors.address">{{ fieldErrors.address }}</small>
      </label>

      <label class="drawer-field">
        <span>Teslimat notu (opsiyonel)</span>
        <textarea
          [(ngModel)]="form.deliveryNote"
          name="deliveryNote"
          rows="2"
          placeholder="Örn. zile basmayın, arka kapıdan gelin, kapıya bırakın..."
        ></textarea>
      </label>

      <div class="drawer-row drawer-row-eta-fee">
        <label class="drawer-field">
          <span>Tahmini süre (ETA)</span>
          <input
            type="text"
            [(ngModel)]="form.eta"
            name="eta"
            placeholder="15 dk"
            [class.input-invalid]="!!fieldErrors.eta"
          />
          <small class="field-error" *ngIf="fieldErrors.eta">{{ fieldErrors.eta }}</small>
        </label>
        <label class="drawer-field">
          <span>Ücret (₺)</span>
          <input
            type="number"
            [(ngModel)]="form.fee"
            name="fee"
            min="0"
            step="0.01"
            [class.input-invalid]="!!fieldErrors.fee"
          />
          <small class="field-error" *ngIf="fieldErrors.fee">{{ fieldErrors.fee }}</small>
        </label>
      </div>

      <label class="drawer-field drawer-field-select payment-select-wrap">
        <span>Ödeme tipi</span>
        <select class="drawer-select payment-select" [(ngModel)]="payment" name="payment">
          <option value="">Seçiniz</option>
          <option *ngFor="let p of paymentOptions; trackBy: trackByPaymentOption" [value]="p">{{ p }}</option>
        </select>
      </label>

      @if (errorMessage) {
        <p class="drawer-error">{{ errorMessage }}</p>
      }

      <div class="drawer-actions">
        <button type="button" class="drawer-btn-secondary" (click)="close()">Vazgeç</button>
        <button type="submit" class="drawer-btn-primary" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Kaydediliyor...' : 'Siparişi oluştur' }}
        </button>
      </div>
    </form>
  </aside>
}
